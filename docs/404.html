<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      var path = window.location.pathname;
      if (path !== '/mc-newbie-guide/') {
        window.location.href = '/mc-newbie-guide/index.html#!' + path;
      } else {
        window.location.href = '/mc-newbie-guide/';
      }
    </script>
  </head>
  <body>
  </body>
</html>
