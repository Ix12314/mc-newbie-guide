<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>实时讯</title>
    <!--
      Single Page Apps for GitHub Pages
      MIT License - https://github.com/rafgraph/spa-github-pages
      This script redirects to index.html with a query string encoding the
      original path, so that BrowserRouter can pick it up after the redirect.
      pathSegmentsToKeep = 1 corresponds to the repo name segment (/hn-news/).
      If you rename the repo or deploy to a user/org root domain, set this to 0.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
